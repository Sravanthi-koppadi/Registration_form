<div class="registration-wrapper">
  <div class="form-container">
    
    <div class="form-header">
      <h1 class="title">Internship Registration</h1>
      <p class="subtitle">Complete the form to start your journey</p>
    </div>

    <form [formGroup]="profileForm" (ngSubmit)="submitdata(profileForm.getRawValue())">
      
      <div class="fieldset">
        <div class="legend">Personal Details</div>
        
        <div class="row">
          <div class="group">
            <label for="firstName">First Name</label>
            <input type="text" id="firstName" formControlName="firstName" placeholder="First Name">
            <small class="err" *ngIf="firstName.invalid && firstName.touched">Required (min 2)</small>
          </div>
          <div class="group">
            <label for="lastName">Last Name</label>
            <input type="text" id="lastName" formControlName="lastName" placeholder="Last Name">
            <small class="err" *ngIf="lastName.invalid && lastName.touched">Required</small>
          </div>
        </div>

        <div class="row">
          <div class="group">
            <label for="email">Email Address</label>
            <input type="email" id="email" formControlName="email" placeholder="email@example.com">
          </div>
          <div class="group">
            <label for="phone">Phone Number</label>
            <input type="tel" id="phone" formControlName="phone" placeholder="10-digit number">
          </div>
        </div>
      </div>

      <div class="fieldset">
        <div class="legend">Application Details</div>
        
        <div class="row">
          <div class="group">
            <label for="dob">Date of Birth</label>
            <input type="date" id="dob" formControlName="dob">
          </div>
          <div class="group">
            <label for="gender">Gender</label>
            <select id="gender" formControlName="gender">
              <option value="">Select Gender</option>
              <option value="male">Male</option>
              <option value="female">Female</option>
              <option value="other">Other</option>
            </select>
          </div>
        </div>

        <div class="group">
          <label for="course">Interested Course</label>
          <select id="course" formControlName="course">
            <option value="">Choose Course</option>
            <option value="java-fs">Java Full-Stack Development</option>
            <option value="angular-pro">Angular Pro & Architecture</option>
            <option value="gen-ai">Generative AI & LLM Engineering</option>
            <option value="data-science">Data Science & Analytics</option>
            <option value="devops">DevOps & Platform Engineering</option>
            <option value="cyber-security">Cybersecurity & Ethical Hacking</option>
            <option value="ui-ux">UI/UX Design with AI Tools</option>
            <option value="python-backend">Python Backend (Django/Flask)</option>
            <option value="mern-stack">MERN Stack Development</option>
            <option value="mobile-app">Mobile App Dev (Flutter/React Native)</option>
          </select>
        </div>
      </div>

      <div class="fieldset">
        <div class="legend">Location & Background</div>
        
        <div class="group">
          <label for="address">Current Address</label>
          <textarea id="address" formControlName="address" rows="2" placeholder="Street Address"></textarea>
        </div>

        <div class="row">
          <div class="group">
            <label for="city" class="visually-hidden">City</label>
            <input type="text" id="city" placeholder="City" formControlName="city">
          </div>
          <div class="group">
            <label for="state" class="visually-hidden">State</label>
            <input type="text" id="state" placeholder="State" formControlName="state">
          </div>
        </div>

        <div class="group">
          <label for="aboutMe">About Me</label>
          <textarea id="aboutMe" formControlName="aboutMe" rows="3" placeholder="Tell us about yourself"></textarea>
        </div>
      </div>

      <div class="form-footer">
        <button type="submit" class="submit-btn" [disabled]="profileForm.invalid">
          Complete Registration
        </button>
      </div>

    </form>
  </div>
</div>
