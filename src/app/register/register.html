<form [formGroup]="profileForm" (ngSubmit)="submitdata(profileForm.value)">
  <h1>Register Details</h1>

  <div class="form-row">
    <div class="form-group">
      <label>First Name</label>
      <input type="text" placeholder="First Name" formControlName="firstName">
      <span class="error" *ngIf="firstName?.invalid && firstName?.touched">Required (min 2 chars)</span>
    </div>

    <div class="form-group">
      <label>Last Name</label>
      <input type="text" placeholder="Last Name" formControlName="lastName">
      <span class="error" *ngIf="lastName?.invalid && lastName?.touched">Last name is required</span>
    </div>
  </div>

  <div class="form-group">
    <label>Email Address</label>
    <input type="email" placeholder="example@mail.com" formControlName="email">
    <span class="error" *ngIf="email?.invalid && email?.touched">Valid email is required</span>
  </div>

  <div class="form-group">
    <label>Phone Number</label>
    <input type="tel" placeholder="10-digit mobile number" formControlName="phone">
    <span class="error" *ngIf="phone?.invalid && phone?.touched">Enter a valid 10-digit number</span>
  </div>

  <div class="form-group">
    <label>Date of Birth</label>
    <input type="date" formControlName="dob">
    <span class="error" *ngIf="dob?.invalid && dob?.touched">Please select your birthday</span>
  </div>

  <div class="form-group">
    <label>Gender</label>
    <select formControlName="gender" class="custom-select">
      <option value="">Select Gender</option>
      <option value="male">Male</option>
      <option value="female">Female</option>
      <option value="other">Other</option>
    </select>
    <span class="error" *ngIf="gender?.invalid && gender?.touched">Please select a gender</span>
  </div>

  <div class="form-group">
    <label>Qualification</label>
    <input type="text" placeholder="Your Degree" formControlName="qualification">
    <span class="error" *ngIf="qualification?.invalid && qualification?.touched">Qualification is required</span>
  </div>

  <div class="form-group">
    <label>Current Address</label>
    <textarea placeholder="Street Address" formControlName="address" rows="2"></textarea>
    <span class="error" *ngIf="address?.invalid && address?.touched">Address is required</span>
  </div>

  <div class="form-row">
    <div class="form-group">
      <input type="text" placeholder="City" formControlName="city">
      <span class="error" *ngIf="city?.invalid && city?.touched">Required</span>
    </div>
    <div class="form-group">
      <input type="text" placeholder="State" formControlName="state">
      <span class="error" *ngIf="state?.invalid && state?.touched">Required</span>
    </div>
  </div>

  <div class="form-row">
    <div class="form-group">
      <input type="text" placeholder="Country" formControlName="country">
      <span class="error" *ngIf="country?.invalid && country?.touched">Required</span>
    </div>
    <div class="form-group">
      <input type="text" placeholder="Zip Code" formControlName="zipCode">
      <span class="error" *ngIf="zipCode?.invalid && zipCode?.touched">Required</span>
    </div>
  </div>

  <div class="form-group">
    <label>Password</label>
    <input type="password" placeholder="Create a strong password" formControlName="password">
    <span class="error" *ngIf="password?.invalid && password?.touched">Password must be 6+ characters</span>
  </div>

  <button type="submit" [disabled]="profileForm.invalid">Complete Registration</button>
</form>
